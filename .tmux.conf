# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features 'xterm-256color:hyperlinks'

# Allow applications to send escape sequences through tmux
set -g allow-passthrough on

# Set transparent background for status bar (inherits terminal background)
set -g status-style bg=default

# Active pane visibility
set -g pane-border-lines heavy
set -g pane-border-style 'fg=#504945'
set -g pane-active-border-style 'fg=#d79921'
set -g pane-border-indicators arrows
set -g window-style 'bg=#1d2021'
set -g window-active-style 'bg=#282828'

# Remap prefix from default 'C-b' to 'C-a' for easier reach
# C-a is more ergonomic than C-b (same as GNU Screen)
unbind C-b
set-option -g prefix C-Space
bind C-Space send-prefix
# set-option -g prefix C-a
# # Allow C-a to be sent to applications by pressing it twice
# bind C-a send-prefix

# Enable mouse support for scrolling, pane selection, and resizing
set -g mouse on

# Enable extended keys (CSI u / kitty keyboard protocol) for modified key support
set -s extended-keys on
bind-key -n S-Enter send-keys -l "\e[13;2u"

# Start numbering windows and panes at 1 instead of 0
# More intuitive for keyboard navigation (matches keyboard number row)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
# Automatically renumber windows when one is closed
set-option -g renumber-windows on

# Custom pane splitting with vim-like directional keys
# Splits create new panes in the direction of the key pressed
bind k split-window -vb -c "#{pane_current_path}"  # Split vertically, new pane above (before)
bind j split-window -v  -c "#{pane_current_path}"  # Split vertically, new pane below
bind h split-window -hb -c "#{pane_current_path}"  # Split horizontally, new pane left (before)
bind l split-window -h  -c "#{pane_current_path}"  # Split horizontally, new pane right

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Move window left/right
bind -r Left swap-window -t -1\; select-window -t -1
bind -r Right swap-window -t +1\; select-window -t +1

# Kill window (like x for pane, but shifted)
bind X confirm-before -p "kill window '#W'? (y/n)" kill-window

# Reload config
bind R source-file ~/.tmux.conf \; display "tmux reloaded"

# Switch to last active pane by pressing prefix twice
bind C-Space last-pane

# vim-tmux-navigator: move between panes and vim splits with C-h/j/k/l
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"

# Toggle status bar visibility with <prefix> b
# Useful for maximizing screen space when needed
bind b set-option status

# Prevent tmux from renaming windows based on running processes
# Keeps your custom window names intact
set-option -g allow-rename off

# Plugin configuration
# TPM - Tmux Plugin Manager for managing tmux plugins
set -g @plugin 'tmux-plugins/tpm'
# Sensible defaults for tmux (escape-time, history-limit, etc.)
set -g @plugin 'tmux-plugins/tmux-sensible'
# Enhanced copy mode with system clipboard integration
set -g @plugin 'tmux-plugins/tmux-yank'
# Seamless navigation between tmux panes and vim splits
# Use Ctrl-h/j/k/l to navigate across both tmux and vim
set -g @plugin 'christoomey/vim-tmux-navigator'

# Minimal status bar theme configuration
# Position status bar at the top of the screen
set -g @minimal-tmux-status "top"
# Status bar background color (gruvbox yellow)
set -g @minimal-tmux-bg "#d79921"
# Status bar foreground color (gruvbox light)
set -g @minimal-tmux-fg "#fbf1c7"

# Load the minimal status bar theme
set -g @plugin 'niksingh710/minimal-tmux-status'

# Session persistence: save and restore sessions across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'   # Auto-restore last saved session on start

# Initialize TPM (must be at the very bottom of tmux.conf)
# This loads and runs all configured plugins
run '/opt/homebrew/opt/tpm/share/tpm/tpm'
